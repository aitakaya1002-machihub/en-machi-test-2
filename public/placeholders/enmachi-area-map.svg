    <text class="jp" x="212" y="224" font-size="12" letter-spacing=".14em">北野方面</text>

    <rect x="890" y="182" width="146" height="54" rx="18" fill="#FFFFFF" fill-opacity=".82"/>
    <text class="serif" x="914" y="212" font-size="24">Hanazono</text>
    <text class="jp" x="914" y="230" font-size="12" letter-spacing=".14em">花園方面</text>

    <rect x="174" y="706" width="158" height="54" rx="18" fill="#FFFFFF" fill-opacity=".82"/>
    <text class="serif" x="198" y="736" font-size="24">Nishinokyo</text>
    <text class="jp" x="198" y="754" font-size="12" letter-spacing=".14em">西ノ京</text>

    <rect x="852" y="706" width="154" height="54" rx="18" fill="#FFFFFF" fill-opacity=".82"/>
    <text class="serif" x="876" y="736" font-size="24">Nijo side</text>
    <text class="jp" x="876" y="754" font-size="12" letter-spacing=".14em">二条方面</text>
  </g>

  <g id="poi-labels">
    <text class="jp" x="536" y="214" font-size="12" letter-spacing=".12em">西大路妙心寺道</text>
    <text class="jp" x="678" y="300" font-size="12" letter-spacing=".12em">丸太町御前</text>
    <text class="jp" x="344" y="300" font-size="12" letter-spacing=".12em">丸太町天神道</text>
    <text class="jp" x="670" y="536" font-size="12" letter-spacing=".12em">西大路太子道</text>
    <text class="jp" x="796" y="648" font-size="12" letter-spacing=".12em">西大路御池</text>
