    <circle cx="562" cy="469" r="55" fill="#4A5C4A" fill-opacity=".08" stroke="#4A5C4A" stroke-opacity=".18"/>
    <path d="M562 446C548.193 446 537 457.193 537 471C537 491.628 562 513.95 562 513.95C562 513.95 587 491.628 587 471C587 457.193 575.807 446 562 446Z" fill="#D7C8A7"/>
    <circle cx="562" cy="471" r="7.5" fill="#4A5C4A"/>
  </g>

  <g id="hubs" filter="url(#pinShadow)">
    <circle cx="430" cy="546" r="13" fill="#4A5C4A"/>
    <circle cx="430" cy="546" r="25" fill="#4A5C4A" fill-opacity=".08" stroke="#4A5C4A" stroke-opacity=".18"/>

    <circle cx="706" cy="606" r="13" fill="#4A5C4A"/>
    <circle cx="706" cy="606" r="25" fill="#4A5C4A" fill-opacity=".08" stroke="#4A5C4A" stroke-opacity=".18"/>
  </g>

  <g id="intersections">
    <circle cx="522" cy="314" r="7" fill="#FFFFFF" stroke="#5F745F" stroke-width="2"/>
    <circle cx="522" cy="550" r="7" fill="#FFFFFF" stroke="#5F745F" stroke-width="2"/>
    <circle cx="654" cy="314" r="7" fill="#FFFFFF" stroke="#5F745F" stroke-width="2"/>
    <circle cx="398" cy="314" r="7" fill="#FFFFFF" stroke="#5F745F" stroke-width="2"/>
    <circle cx="654" cy="550" r="7" fill="#FFFFFF" stroke="#5F745F" stroke-width="2"/>
