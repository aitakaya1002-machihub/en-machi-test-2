<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">JR円町駅を中心にした半径約1kmの準地図寄りエリアマップ</title>
  <desc id="desc">JR円町駅周辺の鉄道、主要道路、交差点、周辺エリア名、moto-machi と yado-machi の拠点位置を簡略化して示したSVGマップです。</desc>

  <defs>
    <linearGradient id="paper" x1="140" y1="120" x2="1060" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4ED"/>
      <stop offset="1" stop-color="#F1EEE6"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#4A5C4A" flood-opacity=".08"/>
    </filter>
    <filter id="pinShadow" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4A5C4A" flood-opacity=".16"/>
    </filter>
    <style>
      .jp {
        fill: #445443;
        font-family: "Noto Sans JP", sans-serif;
      }
      .serif {
        fill: #2F3C2E;
        font-family: "Noto Serif JP", serif;
      }
      .block {
        fill: #FCFBF8;
        stroke: #E1DDD2;
        stroke-width: 1.25;
      }
      .minor-road {
        stroke: #D7D9D1;
        stroke-width: 16;
        stroke-linecap: round;
      }
      .minor-road-core {
        stroke: #FFFFFF;
        stroke-width: 6;
        stroke-linecap: round;
      }
      .major-road {
        stroke: #C6CCBE;
        stroke-width: 32;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .major-road-core {
        stroke: #FFFFFF;
        stroke-width: 11;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .rail {
        stroke: #59705A;
        stroke-width: 18;
        stroke-linecap: round;
      }
      .rail-sleeper {
        stroke: #DCE3DA;
        stroke-width: 4;
        stroke-linecap: round;
      }
      .ring {
        fill: none;
        stroke: #6C836B;
        stroke-width: 1.5;
        stroke-dasharray: 4 9;
      }
      .guide {
        fill: none;
        stroke: #B8C3B2;
        stroke-width: 1.5;
        stroke-dasharray: 3 7;
      }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#ECE8DE"/>
  <g filter="url(#cardShadow)">
    <rect x="58" y="54" width="1084" height="792" rx="30" fill="url(#paper)"/>
  </g>

  <g id="base-grid">
