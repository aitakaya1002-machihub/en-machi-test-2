    <rect class="block" x="318" y="128" width="182" height="110" rx="18"/>
    <rect class="block" x="676" y="128" width="178" height="110" rx="18"/>
    <rect class="block" x="874" y="128" width="176" height="110" rx="18"/>

    <rect class="block" x="146" y="252" width="154" height="120" rx="18"/>
    <rect class="block" x="320" y="252" width="176" height="120" rx="18"/>
    <rect class="block" x="676" y="252" width="174" height="120" rx="18"/>
    <rect class="block" x="870" y="252" width="180" height="120" rx="18"/>

    <rect class="block" x="156" y="398" width="126" height="104" rx="18"/>
    <rect class="block" x="308" y="398" width="146" height="104" rx="18"/>
    <rect class="block" x="694" y="398" width="140" height="104" rx="18"/>
    <rect class="block" x="858" y="398" width="164" height="104" rx="18"/>

    <rect class="block" x="148" y="544" width="146" height="120" rx="18"/>
