    <path d="M906 798V812" stroke="#4A5C4A" stroke-width="2" stroke-linecap="round"/>
    <path d="M959 798V812" stroke="#4A5C4A" stroke-width="2" stroke-linecap="round"/>
    <path d="M1012 798V812" stroke="#4A5C4A" stroke-width="2" stroke-linecap="round"/>
    <text class="jp" x="900" y="784" font-size="11" letter-spacing=".12em">0</text>
    <text class="jp" x="944" y="784" font-size="11" letter-spacing=".12em">500m</text>
    <text class="jp" x="998" y="784" font-size="11" letter-spacing=".12em">1km</text>
  </g>

  <g id="legend">
