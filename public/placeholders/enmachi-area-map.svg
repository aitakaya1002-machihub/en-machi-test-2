    <path class="rail" d="M132 454H1054"/>
    <path class="rail" d="M132 484H1054"/>
    <path class="rail-sleeper" d="M186 469H202"/>
    <path class="rail-sleeper" d="M232 469H248"/>
    <path class="rail-sleeper" d="M278 469H294"/>
    <path class="rail-sleeper" d="M324 469H340"/>
    <path class="rail-sleeper" d="M370 469H386"/>
    <path class="rail-sleeper" d="M416 469H432"/>
    <path class="rail-sleeper" d="M462 469H478"/>
    <path class="rail-sleeper" d="M508 469H524"/>
