  <g id="title-block">
    <text class="serif" x="114" y="108" font-size="34">Enmachi Area Map</text>
    <text class="jp" x="116" y="136" font-size="13" letter-spacing=".2em">JR円町駅から半径約1kmの簡易マップ</text>
  </g>

  <g id="road-labels">
    <text class="jp" x="540" y="100" font-size="14" letter-spacing=".18em">西大路通</text>
    <text class="jp" x="128" y="306" font-size="14" letter-spacing=".18em">丸太町通</text>
    <text class="jp" x="128" y="542" font-size="14" letter-spacing=".18em">太子道</text>
    <text class="jp" x="128" y="648" font-size="14" letter-spacing=".18em">御池通</text>
    <text class="jp" x="134" y="424" font-size="13" letter-spacing=".16em">妙心寺道</text>
    <text class="jp" x="680" y="102" font-size="13" letter-spacing=".16em">御前通</text>
    <text class="jp" x="414" y="102" font-size="13" letter-spacing=".16em">天神道</text>
    <text class="jp" x="786" y="102" font-size="13" letter-spacing=".16em">佐井通</text>
  </g>

  <g id="rail-labels">
    <rect x="812" y="441" width="182" height="58" rx="29" fill="#FFFFFF" fill-opacity=".92"/>
    <text class="jp" x="840" y="476" font-size="14" letter-spacing=".18em">JR嵯峨野線</text>
  </g>

  <g id="station-label">
    <rect x="486" y="530" width="152" height="66" rx="18" fill="#FFFFFF" fill-opacity=".94"/>
    <text class="serif" x="562" y="560" font-size="28" text-anchor="middle">JR Enmachi</text>
    <text class="jp" x="562" y="584" font-size="13" text-anchor="middle" letter-spacing=".16em">JR円町駅</text>
  </g>

  <g id="hub-labels">
    <rect x="252" y="566" width="146" height="62" rx="18" fill="#FFFFFF" fill-opacity=".92"/>
    <text class="serif" x="272" y="596" font-size="25">moto-machi</text>
    <text class="jp" x="272" y="618" font-size="12" letter-spacing=".12em">atelier garage</text>
    <path class="guide" d="M398 596H420"/>

    <rect x="728" y="548" width="150" height="62" rx="18" fill="#FFFFFF" fill-opacity=".92"/>
    <text class="serif" x="748" y="578" font-size="25">yado-machi</text>
    <text class="jp" x="748" y="600" font-size="12" letter-spacing=".12em">stay like a local</text>
    <path class="guide" d="M708 586H728"/>
  </g>

